name: Build Windows Package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create portable package
        run: |
          New-Item -ItemType Directory -Path package -Force
          Copy-Item app.py package/
          Copy-Item .gitignore package/ -ErrorAction SilentlyContinue

          # Create batch file
          @"
          @echo off
          echo ============================================================
          echo   Utility Bill Tracker
          echo ============================================================
          echo.
          echo Checking Python installation...
          python --version >nul 2>&1
          if errorlevel 1 (
              echo ERROR: Python is not installed!
              echo Please install Python from https://www.python.org/downloads/
              pause
              exit /b 1
          )
          echo Python found!
          echo.
          echo Installing required packages...
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet streamlit pandas openpyxl
          echo.
          echo Starting Utility Bill Tracker...
          echo Your browser should open automatically.
          echo If not, open: http://localhost:8501
          echo.
          echo Press Ctrl+C to stop the application
          echo ============================================================
          python -m streamlit run app.py
          "@ | Out-File -FilePath package\run.bat -Encoding ASCII

          # Create README
          @"
          Utility Bill Tracker
          ====================

          Requirements:
          - Python 3.8 or higher (download from https://www.python.org/downloads/)

          Instructions:
          1. Double-click 'run.bat' to start the application
          2. First run will install required packages (takes 1-2 minutes)
          3. Your browser will open automatically
          4. To stop, close the terminal window or press Ctrl+C

          Troubleshooting:
          - If you see "Python is not installed", install Python first
          - If browser doesn't open, manually go to: http://localhost:8501
          - Make sure no other app is using port 8501

          "@ | Out-File -FilePath package\README.txt -Encoding UTF8

          # Create requirements file
          @"
          streamlit>=1.28.0
          pandas>=2.0.0
          openpyxl>=3.1.0
          "@ | Out-File -FilePath package\requirements.txt -Encoding UTF8

      - name: Create ZIP archive
        run: |
          Compress-Archive -Path package\* -DestinationPath UtilityTracker-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UtilityTracker-Windows
          path: UtilityTracker-Windows.zip
