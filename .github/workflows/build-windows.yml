name: Build Windows Executable

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install streamlit pandas openpyxl pyinstaller

      - name: Create runner script
        run: |
          @"
          import subprocess
          import sys
          import os

          def main():
              app_path = os.path.join(os.path.dirname(__file__), "app.py")
              subprocess.run([sys.executable, "-m", "streamlit", "run", app_path, "--server.headless=true"])

          if __name__ == "__main__":
              main()
          "@ | Out-File -FilePath run_app.py -Encoding UTF8

      - name: Build executable
        run: |
          pyinstaller --onefile --noconsole --add-data "app.py;." --hidden-import=streamlit --hidden-import=pandas --hidden-import=openpyxl --collect-all=streamlit run_app.py

      - name: Rename executable
        run: |
          Move-Item -Path dist\run_app.exe -Destination dist\UtilityTracker.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UtilityTracker-Windows
          path: dist/UtilityTracker.exe
