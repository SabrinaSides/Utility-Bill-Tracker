- name: Create spec file
  run: |
    @"
    # -*- mode: python ; coding: utf-8 -*-

    block_cipher = None

    a = Analysis(
        ['run_app.py'],
        pathex=[],
        binaries=[],
        datas=[('app.py', '.')],
        hiddenimports=['streamlit', 'pandas', 'openpyxl', 'streamlit.web.cli'],
        hookspath=[],
        hooksconfig={},
        runtime_hooks=[],
        excludes=[],
        win_no_prefer_redirects=False,
        win_private_assemblies=False,
        cipher=block_cipher,
        noarchive=False,
    )
    pyz = PYZ(a.pure, a.zipped_data, cipher=block_cipher)

    exe = EXE(
        pyz,
        a.scripts,
        [],
        exclude_binaries=True,
        name='UtilityTracker',
        debug=False,
        bootloader_ignore_signals=False,
        strip=False,
        upx=True,
        console=True,  # Changed to True to see errors
        disable_windowed_traceback=False,
        argv_emulation=False,
        target_arch=None,
        codesign_identity=None,
        entitlements_file=None,
    )
    coll = COLLECT(
        exe,
        a.binaries,
        a.zipfiles,
        a.datas,
        strip=False,
        upx=True,
        upx_exclude=[],
        name='UtilityTracker',
    )
    "@ | Out-File -FilePath app.spec -Encoding UTF8

- name: Build executable with spec
  run: |
    pyinstaller app.spec

- name: Upload artifact
  uses: actions/upload-artifact@v4
  with:
    name: UtilityTracker-Windows
    path: dist/UtilityTracker/
